name: CI/CD Pipeline for Frontend & Backend with Postman Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job pour le Backend
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js for Backend
        uses: actions/setup-node@v3
        with:
          node-version: '22.12.0'
          
      - name: Install Backend Dependencies
        working-directory: ./Backend
        run: npm install

      - name: Start Backend Server
        working-directory: ./Backend
        run: |
          npm start &  # Démarre ton backend en arrière-plan
          sleep 5      # Attends quelques secondes pour que le serveur soit lancé

      

  # Job pour le Frontend
  frontend-tests:
    runs-on: ubuntu-latest
    needs: backend-tests  # Attendre la fin du job backend pour commencer le frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js for Frontend
        uses: actions/setup-node@v3
        with:
          node-version: '22.12.0'

      - name: Install Frontend Dependencies
        working-directory: ./Frontend
        run: npm install

      - name: Run Frontend Tests
        working-directory: ./Frontend
        run: npm test
        
      #- name: Deploy Frontend
     #   run: |
    # Par exemple, pour Netlify ou Vercel
    # git push ou utiliser un autre outil de déploiement
